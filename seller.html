<!DOCTYPE html>
<html>

<head>
  <title>Seller Dashboard</title>

  <link rel="stylesheet" href="styles/pages/seller/sidebar.css">
  <link rel="stylesheet" href="styles/pages/seller/dashboard.css">
</head>

<body>

  <div class="dashboard-layout">

    <!-- Sidebar -->
    <div class="sidebar">

      <a href="amazon.html" class="storefront-link">
        ← View Store
      </a>

      <div class="sidebar-title">
        Seller Panel
      </div>

      <a href="seller.html" class="sidebar-link">
        Dashboard
      </a>

      <a href="seller-products.html" class="sidebar-link">
        Products
      </a>

      <a href="seller-orders.html" class="sidebar-link">
        Orders
      </a>

      <a href="seller-transactions.html" class="sidebar-link">
        Transactions
      </a>

      <button class="logout-button js-logout-button">
        Logout
      </button>

    </div>

    <!-- MAIN -->
    <div class="dashboard-main">

      <h1 class="js-shop-name">
        Dashboard
      </h1>

      <div class="dashboard-cards">

        <div class="dashboard-card">
          <h3>Total Sales</h3>
          <p>$12,500</p>
        </div>

        <div class="dashboard-card">
          <h3>Total Orders</h3>
          <p>235</p>
        </div>

        <div class="dashboard-card">
          <h3>Products</h3>
          <p>18</p>
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="scripts/auth/protectSellerPage.js">
  </script>

  <script type="module" src="scripts/auth/logout.js">
  </script>

  <script type="module" src="scripts/seller/seller.js">
  </script>

</body>

</html>
