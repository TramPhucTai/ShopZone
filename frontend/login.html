<!DOCTYPE html>
<html>

<head>
  <title>Login</title>

  <link rel="stylesheet" href="styles/auth/auth.css">
</head>

<body>

  <div class="auth-container">

    <div class="auth-card">

      <h1>Seller Login</h1>

      <input
        class="auth-input js-email-input"
        type="email"
        placeholder="Email">

      <input
        class="auth-input js-password-input"
        type="password"
        placeholder="Password">

      <button class="auth-button js-login-button">
        Login
      </button>

      <div class="auth-footer">
        No account?
        <a href="register.html">Register</a>
      </div>

    </div>

  </div>

  <script type="module" src="scripts/auth/login.js"></script>

</body>

</html>
