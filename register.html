<!DOCTYPE html>
<html>

<head>
  <title>Register</title>

  <link rel="stylesheet" href="styles/auth/auth.css">
</head>

<body>

  <div class="auth-container">

    <div class="auth-card">

      <h1>Create Seller Account</h1>

      <input
        class="auth-input js-shop-name-input"
        type="text"
        placeholder="Shop Name">

      <input
        class="auth-input js-email-input"
        type="email"
        placeholder="Email">

      <input
        class="auth-input js-password-input"
        type="password"
        placeholder="Password">

      <button class="auth-button js-register-button">
        Register
      </button>

      <div class="auth-footer">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </div>

  </div>

  <script type="module" src="scripts/auth/register.js"></script>

</body>

</html>
